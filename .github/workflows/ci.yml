name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        # bash on every OS so the glob expands (Windows cmd/pwsh don't glob,
        # and node <21 doesn't expand test patterns itself)
        shell: bash
        run: node --test skills/cc-redline/scripts/tests/*.test.mjs

  e2e:
    name: e2e / chrome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # channel 'chrome' drives the runner's preinstalled Google Chrome — no browser download
      - run: npx playwright test
